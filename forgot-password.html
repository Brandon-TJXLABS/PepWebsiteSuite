<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Reset Password — Aciona</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="/" class="brand"><svg width="22" height="22" viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M17,66 A35,35 0 1 1 83,66" style="stroke:var(--blue-deep);" stroke-width="6.5" stroke-linecap="round" fill="none"/><polygon points="50,16 26,71 74,71" style="fill:var(--blue-deep);"/><circle cx="50" cy="80.5" r="5.5" style="fill:var(--blue-deep);"/></svg> Aciona</a>
    <button class="nav-toggle" onclick="acionaToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="shop">Shop</a></li>
      <li><a href="about">About</a></li>
      <li><a href="lab-results">Lab Results</a></li>
      <li><a href="product-request">Request a Product</a></li>
      <li><a href="contact">Contact</a></li>
      <li><a href="cart">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:56px;">
  <div class="wrap" style="max-width:440px;">
    <div class="eyebrow">Account recovery</div>
    <h1 style="font-size:2.1rem;">Reset your password</h1>
    <p class="lede" style="font-size:.95rem;">Enter your email and we'll send you a link to set a new password.</p>

    <form id="forgot-form" class="contact-form" style="margin-top:24px;">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
      </div>
      <div id="forgot-error" style="color:#B3261E; font-size:.85rem; display:none;"></div>
      <div id="forgot-success" style="color:var(--verified); font-size:.85rem; display:none;"></div>
      <button type="submit" class="btn btn-primary" style="justify-self:start;">Send reset link</button>
    </form>

    <p style="margin-top:20px; font-size:.9rem; color:var(--ink-soft);">
      Remembered it? <a href="login">Log in</a>
    </p>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/shipping.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const errorBox = document.getElementById('forgot-error');
  const successBox = document.getElementById('forgot-success');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/update-password'
  });

  if (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
    return;
  }
  errorBox.style.display = 'none';
  successBox.textContent = 'Check your email for a reset link.';
  successBox.style.display = 'block';
  document.getElementById('forgot-form').reset();
});
</script>

<!-- Cart drawer (side sheet) -->
<div class="drawer-overlay" id="cart-drawer-overlay" onclick="if(event.target === this) acionaCloseCartDrawer()">
  <div class="drawer-panel">
    <div class="drawer-head">
      <h3>Your cart</h3>
      <button class="modal-close" onclick="acionaCloseCartDrawer()" aria-label="Close" style="position:static;">×</button>
    </div>
    <div class="drawer-body" id="cart-drawer-body"></div>
    <div class="drawer-footer" id="cart-drawer-footer" style="display:none;"></div>
  </div>
</div>

</body>
</html>
