<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — PureVial</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-mark"></span> PureVial</a>
    <button class="nav-toggle" onclick="purevialToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="index.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="lab-results.html">Lab Results</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login.html" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:56px;">
  <div class="wrap" style="max-width:440px;">
    <div class="eyebrow">Account recovery</div>
    <h1 style="font-size:2.1rem;">Reset your password</h1>
    <p class="lede" style="font-size:.95rem;">Enter your email and we'll send you a link to set a new password.</p>

    <form id="forgot-form" class="contact-form" style="margin-top:24px;">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
      </div>
      <div id="forgot-error" style="color:#B3261E; font-size:.85rem; display:none;"></div>
      <div id="forgot-success" style="color:var(--verified); font-size:.85rem; display:none;"></div>
      <button type="submit" class="btn btn-primary" style="justify-self:start;">Send reset link</button>
    </form>

    <p style="margin-top:20px; font-size:.9rem; color:var(--ink-soft);">
      Remembered it? <a href="login.html">Log in</a>
    </p>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const errorBox = document.getElementById('forgot-error');
  const successBox = document.getElementById('forgot-success');

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname.replace('forgot-password.html', 'update-password.html')
  });

  if (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
    return;
  }
  errorBox.style.display = 'none';
  successBox.textContent = 'Check your email for a reset link.';
  successBox.style.display = 'block';
  document.getElementById('forgot-form').reset();
});
</script>

</body>
</html>
