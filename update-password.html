<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — Aciona</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-mark"></span> Aciona</a>
    <button class="nav-toggle" onclick="acionaToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="index.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="lab-results.html">Lab Results</a></li>
      <li><a href="product-request.html">Request a Product</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login.html" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:56px;">
  <div class="wrap" style="max-width:440px;">
    <div class="eyebrow">Account recovery</div>
    <h1 style="font-size:2.1rem;">Set a new password</h1>

    <form id="update-form" class="contact-form" style="margin-top:24px;">
      <div class="field">
        <label for="password">New password</label>
        <div class="password-field">
          <input type="password" id="password" minlength="6" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)">Show</button>
        </div>
      </div>
      <div id="update-error" style="color:#B3261E; font-size:.85rem; display:none;"></div>
      <div id="update-success" style="color:var(--verified); font-size:.85rem; display:none;"></div>
      <button type="submit" class="btn btn-primary" style="justify-self:start;">Update password</button>
    </form>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/shipping.js"></script>
<script>
function togglePassword(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? 'Hide' : 'Show';
}

document.getElementById('update-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('update-error');
  const successBox = document.getElementById('update-success');

  const { error } = await supabaseClient.auth.updateUser({ password });

  if (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
    return;
  }
  errorBox.style.display = 'none';
  successBox.textContent = 'Password updated. Redirecting to login…';
  successBox.style.display = 'block';
  setTimeout(() => { window.location.href = 'login.html'; }, 2000);
});
</script>

<!-- Cart drawer (side sheet) -->
<div class="drawer-overlay" id="cart-drawer-overlay" onclick="if(event.target === this) acionaCloseCartDrawer()">
  <div class="drawer-panel">
    <div class="drawer-head">
      <h3>Your cart</h3>
      <button class="modal-close" onclick="acionaCloseCartDrawer()" aria-label="Close" style="position:static;">×</button>
    </div>
    <div class="drawer-body" id="cart-drawer-body"></div>
    <div class="drawer-footer" id="cart-drawer-footer" style="display:none;"></div>
  </div>
</div>

</body>
</html>
