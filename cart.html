<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Your Cart — Aciona</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="/" class="brand"><svg width="22" height="22" viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M17,66 A35,35 0 1 1 83,66" style="stroke:var(--blue-deep);" stroke-width="6.5" stroke-linecap="round" fill="none"/><polygon points="50,16 26,71 74,71" style="fill:var(--blue-deep);"/><circle cx="50" cy="80.5" r="5.5" style="fill:var(--blue-deep);"/></svg> Aciona</a>
    <button class="nav-toggle" onclick="acionaToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="shop">Shop</a></li>
      <li><a href="about">About</a></li>
      <li><a href="lab-results">Lab Results</a></li>
      <li><a href="product-request">Request a Product</a></li>
      <li><a href="contact">Contact</a></li>
      <li><a href="cart" class="active">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:40px;">
  <div class="wrap">
    <div class="eyebrow">Your order</div>
    <h1>Cart</h1>
  </div>
</section>

<section style="padding-top:0;">
  <div class="wrap">
    <div id="cart-container">
      <p style="color:var(--ink-soft);">Loading cart…</p>
    </div>
    <div class="cart-summary" id="cart-summary" style="display:none; flex-direction:column; align-items:flex-end; gap:6px;">
      <div class="coa-row" style="width:100%; max-width:340px; border:none;"><span class="label">Subtotal</span><span class="value" id="cart-subtotal">$0.00 AUD</span></div>
      <div class="coa-row" style="width:100%; max-width:340px; border:none;"><span class="label">Shipping</span><span class="value" id="cart-shipping">—</span></div>
      <div class="coa-row" style="width:100%; max-width:340px;"><span class="label"><strong>Estimated total</strong></span><span class="value" id="cart-total">$0.00 AUD</span></div>
      <p class="shipping-note" id="cart-shipping-note" style="text-align:right; max-width:340px;"></p>
    </div>
    <div style="text-align:right; margin-top:12px;">
      <a href="checkout" class="btn btn-primary" id="checkout-btn" style="display:none;">Proceed to checkout</a>
    </div>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/shipping.js"></script>
<script>
async function renderCart() {
  const user = await acionaRequireAuth();
  if (!user) return;

  const container = document.getElementById('cart-container');
  const cart = await acionaGetCart();

  if (cart.length === 0) {
    container.innerHTML = '<p style="color:var(--ink-soft);">Your cart is empty. <a href="/">Browse products</a>.</p>';
    return;
  }

  let subtotal = 0;
  let totalVials = 0;
  let hasUnavailable = false;
  container.innerHTML = cart.map(item => {
    const product = item.products;
    const unavailable = product.active === false;
    if (unavailable) hasUnavailable = true;

    if (!unavailable) {
      subtotal += product.price_cents * item.quantity;
      totalVials += item.quantity;
    }

    return `
      <div class="cart-row" style="${unavailable ? 'opacity:.6;' : ''}">
        <img class="cart-row-image" src="${product.image_url || PLACEHOLDER_IMAGE_SVG}" alt="${product.name}" loading="lazy">
        <div>
          <strong>${product.name}</strong>
          <div class="code mono" style="color:var(--ink-soft);">${product.sku}</div>
          ${unavailable ? '<div style="font-size:.78rem; color:#B3261E; font-weight:600;">No longer available — remove to continue</div>' : ''}
        </div>
        <div class="mono">$${(product.price_cents / 100).toFixed(2)} ea</div>
        <div class="qty-controls">
          ${unavailable
            ? `<span class="mono">${item.quantity}</span>`
            : `<button onclick="changeQty('${item.id}', ${item.quantity - 1})">−</button>
               <span class="mono">${item.quantity}</span>
               <button onclick="changeQty('${item.id}', ${item.quantity + 1})">+</button>`}
        </div>
        <div>
          <a href="#" onclick="removeItem('${item.id}'); return false;" style="font-size:.85rem;">Remove</a>
        </div>
      </div>
    `;
  }).join('');

  const shipping = await acionaCalculateShipping(totalVials, subtotal);
  const shippingNote = document.getElementById('cart-shipping-note');

  document.getElementById('cart-summary').style.display = 'flex';
  document.getElementById('cart-subtotal').textContent = '$' + (subtotal / 100).toFixed(2) + ' AUD';
  document.getElementById('cart-shipping').textContent = shipping.label;

  if (shipping.requiresQuote) {
    document.getElementById('cart-total').textContent = '$' + (subtotal / 100).toFixed(2) + ' AUD + shipping';
    shippingNote.textContent = 'Your order is 60+ vials, so shipping needs a manual quote — you\'ll be able to request one at checkout.';
    shippingNote.classList.add('quote');
  } else {
    document.getElementById('cart-total').textContent = '$' + ((subtotal + shipping.cents) / 100).toFixed(2) + ' AUD';
    shippingNote.textContent = 'Estimated — confirmed at checkout.';
    shippingNote.classList.remove('quote');
  }

  const checkoutBtn = document.getElementById('checkout-btn');
  if (hasUnavailable) {
    checkoutBtn.style.display = 'none';
    shippingNote.textContent = 'Remove the unavailable item(s) above before checking out.';
    shippingNote.classList.add('quote');
  } else {
    checkoutBtn.style.display = 'inline-flex';
  }
}

async function changeQty(cartItemId, newQty) {
  await acionaUpdateCartQuantity(cartItemId, newQty);
  renderCart();
  acionaUpdateCartCount();
}

async function removeItem(cartItemId) {
  await acionaRemoveFromCart(cartItemId);
  renderCart();
  acionaUpdateCartCount();
}

renderCart();
</script>

<!-- Cart drawer (side sheet) -->
<div class="drawer-overlay" id="cart-drawer-overlay" onclick="if(event.target === this) acionaCloseCartDrawer()">
  <div class="drawer-panel">
    <div class="drawer-head">
      <h3>Your cart</h3>
      <button class="modal-close" onclick="acionaCloseCartDrawer()" aria-label="Close" style="position:static;">×</button>
    </div>
    <div class="drawer-body" id="cart-drawer-body"></div>
    <div class="drawer-footer" id="cart-drawer-footer" style="display:none;"></div>
  </div>
</div>

</body>
</html>
