<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Aciona</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-mark"></span> Aciona</a>
    <button class="nav-toggle" onclick="acionaToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="index.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="lab-results.html">Lab Results</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="active">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login.html" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:40px;">
  <div class="wrap">
    <div class="eyebrow">Your order</div>
    <h1>Cart</h1>
  </div>
</section>

<section style="padding-top:0;">
  <div class="wrap">
    <div id="cart-container">
      <p style="color:var(--ink-soft);">Loading cart…</p>
    </div>
    <div class="cart-summary" id="cart-summary" style="display:none; flex-direction:column; align-items:flex-end; gap:6px;">
      <div class="coa-row" style="width:100%; max-width:340px; border:none;"><span class="label">Subtotal</span><span class="value" id="cart-subtotal">$0.00 USD</span></div>
      <div class="coa-row" style="width:100%; max-width:340px; border:none;"><span class="label">Shipping</span><span class="value" id="cart-shipping">—</span></div>
      <div class="coa-row" style="width:100%; max-width:340px;"><span class="label"><strong>Estimated total</strong></span><span class="value" id="cart-total">$0.00 USD</span></div>
      <p class="shipping-note" id="cart-shipping-note" style="text-align:right; max-width:340px;"></p>
    </div>
    <div style="text-align:right; margin-top:12px;">
      <a href="checkout.html" class="btn btn-primary" id="checkout-btn" style="display:none;">Proceed to checkout</a>
    </div>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/shipping.js"></script>
<script>
async function renderCart() {
  const user = await acionaRequireAuth();
  if (!user) return;

  const container = document.getElementById('cart-container');
  const cart = await acionaGetCart();

  if (cart.length === 0) {
    container.innerHTML = '<p style="color:var(--ink-soft);">Your cart is empty. <a href="index.html">Browse products</a>.</p>';
    return;
  }

  let subtotal = 0;
  let totalVials = 0;
  container.innerHTML = cart.map(item => {
    const product = item.products;
    const lineTotal = product.price_cents * item.quantity;
    subtotal += lineTotal;
    totalVials += item.quantity;
    return `
      <div class="cart-row">
        <div>
          <strong>${product.name}</strong>
          <div class="code mono" style="color:var(--ink-soft);">${product.sku}</div>
        </div>
        <div class="mono">$${(product.price_cents / 100).toFixed(2)} ea</div>
        <div class="qty-controls">
          <button onclick="changeQty('${item.id}', ${item.quantity - 1})">−</button>
          <span class="mono">${item.quantity}</span>
          <button onclick="changeQty('${item.id}', ${item.quantity + 1})">+</button>
        </div>
        <div>
          <a href="#" onclick="removeItem('${item.id}'); return false;" style="font-size:.85rem;">Remove</a>
        </div>
      </div>
    `;
  }).join('');

  const shipping = acionaCalculateShipping(totalVials, subtotal);
  const shippingNote = document.getElementById('cart-shipping-note');

  document.getElementById('cart-summary').style.display = 'flex';
  document.getElementById('cart-subtotal').textContent = '$' + (subtotal / 100).toFixed(2) + ' USD';
  document.getElementById('cart-shipping').textContent = shipping.label;

  if (shipping.requiresQuote) {
    document.getElementById('cart-total').textContent = '$' + (subtotal / 100).toFixed(2) + ' USD + shipping';
    shippingNote.textContent = 'Your order is 60+ vials, so shipping needs a manual quote — you\'ll be able to request one at checkout.';
    shippingNote.classList.add('quote');
  } else {
    document.getElementById('cart-total').textContent = '$' + ((subtotal + shipping.cents) / 100).toFixed(2) + ' USD';
    shippingNote.textContent = 'Estimated — confirmed at checkout.';
    shippingNote.classList.remove('quote');
  }

  document.getElementById('checkout-btn').style.display = 'inline-flex';
}

async function changeQty(cartItemId, newQty) {
  await acionaUpdateCartQuantity(cartItemId, newQty);
  renderCart();
  acionaUpdateCartCount();
}

async function removeItem(cartItemId) {
  await acionaRemoveFromCart(cartItemId);
  renderCart();
  acionaUpdateCartCount();
}

renderCart();
</script>

</body>
</html>
