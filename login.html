<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Aciona</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="index.html" class="brand"><span class="brand-mark"></span> Aciona</a>
    <button class="nav-toggle" onclick="acionaToggleNav()" aria-label="Menu">☰</button>
    <ul class="navlinks" id="nav-links">
      <li><a href="index.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="lab-results.html">Lab Results</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login.html" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:56px;">
  <div class="wrap" style="max-width:440px;">
    <div class="eyebrow">Welcome back</div>
    <h1 style="font-size:2.1rem;">Log in to your account</h1>

    <form id="login-form" class="contact-form" style="margin-top:24px;">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)">Show</button>
        </div>
      </div>
      <div style="text-align:right; margin-top:-10px;">
        <a href="forgot-password.html" style="font-size:.85rem;">Forgot password?</a>
      </div>
      <div id="login-error" style="color:#B3261E; font-size:.85rem; display:none;"></div>
      <button type="submit" class="btn btn-primary" style="justify-self:start;">Log in</button>
    </form>

    <p style="margin-top:20px; font-size:.9rem; color:var(--ink-soft);">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>
  </div>
</section>

<script src="js/age-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script>
function togglePassword(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? 'Hide' : 'Show';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('login-error');

  const { error } = await acionaSignIn(email, password);
  if (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    return;
  }

  const pendingAdd = sessionStorage.getItem('aciona_pending_cart_add');
  if (pendingAdd) {
    sessionStorage.removeItem('aciona_pending_cart_add');
    const { productId, quantity } = JSON.parse(pendingAdd);
    await acionaAddToCart(productId, quantity);
    window.location.href = 'cart.html';
    return;
  }

  window.location.href = 'account.html';
});
</script>

</body>
</html>
