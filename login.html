<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — PureVial</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <div class="brand"><span class="brand-mark"></span> PureVial</div>
    <ul class="navlinks">
      <li><a href="index.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="lab-results.html">Lab Results</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">Cart <span id="cart-count" class="cart-badge"></span></a></li>
      <li><a href="login.html" id="nav-account">Login</a></li>
    </ul>
  </nav>
</header>

<section class="hero" style="padding-bottom:56px;">
  <div class="wrap" style="max-width:440px;">
    <div class="eyebrow">Welcome back</div>
    <h1 style="font-size:2.1rem;">Log in to your account</h1>

    <form id="login-form" class="contact-form" style="margin-top:24px;">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <div id="login-error" style="color:#B3261E; font-size:.85rem; display:none;"></div>
      <button type="submit" class="btn btn-primary" style="justify-self:start;">Log in</button>
    </form>

    <p style="margin-top:20px; font-size:.9rem; color:var(--ink-soft);">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('login-error');

  const { error } = await purevialSignIn(email, password);
  if (error) {
    errorBox.textContent = error.message;
    errorBox.style.display = 'block';
    return;
  }
  window.location.href = 'account.html';
});
</script>

</body>
</html>
